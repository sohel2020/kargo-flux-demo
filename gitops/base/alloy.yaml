apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: helm-charts/alloy
      sourceRef:
        kind: GitRepository
        name: flux-sync
        namespace: flux-system
      interval: 1m
  targetNamespace: alloy
