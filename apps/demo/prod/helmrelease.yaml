apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: demo
  namespace: demo-prod
spec:
  interval: 1m
  chart:
    spec:
      chart: demo
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: demo
        namespace: flux-system
  values:
    replicaCount: 2
