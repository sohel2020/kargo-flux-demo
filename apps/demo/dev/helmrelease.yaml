apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: demo
  namespace: demo-dev
spec:
  interval: 1m
  chart:
    spec:
      chart: demo
      version: 4.0.0
      sourceRef:
        kind: HelmRepository
        name: demo
        namespace: flux-system
  values:
    replicaCount: 1
