apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: podinfo
spec:
  requestedFreight:
    - origin: {kind: Warehouse, name: podinfo}
      sources: {direct: true}
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/sohel2020/kargo-flux-demo.git
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/apps/podinfo/dev/kustomization.yaml
            updates:
              - key: images.0.newTag
                value: ${{ imageFrom("ghcr.io/stefanprodan/podinfo").Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: 'promote dev to ${{ imageFrom("ghcr.io/stefanprodan/podinfo").Tag }}'
        - uses: git-push
          config: {path: ./repo}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage
  namespace: podinfo
spec:
  requestedFreight:
