apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: podinfo
  namespace: podinfo
spec:
  promotionPolicies:
    - stageSelector:
        name: dev
      # pinned: dev held at a specific freight (6.12.0) instead of auto-tracking newest.
      # set back to true to resume auto-promotion of the newest discovered image.
      autoPromotionEnabled: false
